<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小红书配图 - 标签体系</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #f5f5f5;
    font-family: "PingFang SC", -apple-system, sans-serif;
    padding: 20px;
  }
  .canvas {
    width: 1080px;
    height: 1080px;
    background: #F8FAFB;
    position: relative;
    padding: 80px 60px;
  }
  .title {
    font-size: 48px;
    font-weight: 900;
    color: #1A2332;
    margin-bottom: 20px;
    letter-spacing: 0.02em;
  }
  .title-highlight {
    color: #3A8DA8;
  }
  .subtitle {
    font-size: 20px;
    color: #5A6470;
    margin-bottom: 60px;
    letter-spacing: 0.05em;
  }
  /* 维度卡片 */
  .dimensions {
    display: flex;
    flex-direction: column;
    gap: 40px;
  }
  .dimension {
    background: #fff;
    border: 2px solid rgba(58,141,168,0.2);
    padding: 40px;
  }
  .dimension-header {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 24px;
  }
  .dimension-number {
    flex-shrink: 0;
    width: 60px;
    height: 60px;
    background: #3A8DA8;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: 900;
  }
  .dimension-title {
    font-size: 32px;
    font-weight: 700;
    color: #1A2332;
    letter-spacing: 0.02em;
  }
  .dimension-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
  }
  .tag {
    background: rgba(58,141,168,0.08);
    border: 1px solid rgba(58,141,168,0.2);
    padding: 12px 24px;
    font-size: 20px;
    color: #3A8DA8;
    font-weight: 600;
    letter-spacing: 0.05em;
  }
  /* 示例卡片 */
  .example {
    margin-top: 40px;
    background: rgba(58,141,168,0.05);
    border-left: 4px solid #3A8DA8;
    padding: 32px;
  }
  .example-title {
    font-size: 20px;
    color: #5A6470;
    margin-bottom: 16px;
    letter-spacing: 0.05em;
  }
  .example-case {
    font-size: 24px;
    color: #1A2332;
    line-height: 1.6;
    margin-bottom: 16px;
  }
  .example-case strong {
    color: #3A8DA8;
    font-weight: 700;
  }
  .example-result {
    font-size: 18px;
    color: #5A6470;
    line-height: 1.6;
  }
  /* 底部 */
  .footer {
    position: absolute;
    bottom: 60px;
    left: 60px;
    right: 60px;
    padding-top: 32px;
    border-top: 1px solid rgba(58,141,168,0.25);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .footer-brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .brand-logo {
    width: 32px;
    height: 32px;
    border: 1.5px solid #3A8DA8;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    color: #3A8DA8;
    font-weight: 600;
    line-height: 1.2;
    text-align: center;
  }
  .brand-text {
    font-size: 14px;
    color: #5A6470;
    letter-spacing: 0.1em;
  }
  .footer-tag {
    font-size: 16px;
    color: #8B96A5;
    letter-spacing: 0.05em;
  }
  .download-btn {
    position: fixed;
    bottom: 40px;
    right: 40px;
    padding: 16px 32px;
    background: #3A8DA8;
    color: #fff;
    border: none;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.05em;
    z-index: 1000;
  }
  .download-btn:hover {
    background: #4A9DB8;
  }
</style>
</head>
<body>
  <div class="canvas" id="canvas">
    <div class="title">
      标签体系：<span class="title-highlight">3 个维度</span>
    </div>
    <div class="subtitle">让知识点可精准检索</div>
    
    <div class="dimensions">
      <div class="dimension">
        <div class="dimension-header">
          <div class="dimension-number">1</div>
          <div class="dimension-title">阶段维度</div>
        </div>
        <div class="dimension-tags">
          <span class="tag">入门</span>
          <span class="tag">进阶</span>
          <span class="tag">高级</span>
        </div>
      </div>
      
      <div class="dimension">
        <div class="dimension-header">
          <div class="dimension-number">2</div>
          <div class="dimension-title">场景维度</div>
        </div>
        <div class="dimension-tags">
          <span class="tag">配置</span>
          <span class="tag">开发</span>
          <span class="tag">调试</span>
          <span class="tag">部署</span>
        </div>
      </div>
      
      <div class="dimension">
        <div class="dimension-header">
          <div class="dimension-number">3</div>
          <div class="dimension-title">目标维度</div>
        </div>
        <div class="dimension-tags">
          <span class="tag">快速上手</span>
          <span class="tag">深入理解</span>
          <span class="tag">故障排查</span>
        </div>
      </div>
    </div>
    
    <div class="example">
      <div class="example-title">示例：知识点《插件目录结构规范》</div>
      <div class="example-case">
        → 阶段：<strong>入门</strong><br>
        → 场景：<strong>开发</strong><br>
        → 目标：<strong>快速上手</strong>
      </div>
      <div class="example-result">
        用户搜索"新手插件开发" → 精准匹配！
      </div>
    </div>
    
    <div class="footer">
      <div class="footer-brand">
        <div class="brand-logo">CT<br>RD</div>
        <span class="brand-text">草台研究部</span>
      </div>
      <span class="footer-tag">多维度标签 × 精准检索</span>
    </div>
  </div>
  
  <button class="download-btn" onclick="downloadImage()">下载配图</button>
  
  <script>
    async function downloadImage() {
      const canvas = document.getElementById('canvas');
      const scale = 2;
      
      const script = document.createElement('script');
      script.src = 'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
      document.head.appendChild(script);
      
      script.onload = async () => {
        const renderedCanvas = await html2canvas(canvas, {
          scale: scale,
          backgroundColor: '#F8FAFB',
          logging: false,
          width: 1080,
          height: 1080
        });
        
        const link = document.createElement('a');
        link.download = '小红书配图-标签体系.png';
        link.href = renderedCanvas.toDataURL('image/png');
        link.click();
      };
    }
  </script>
</body>
</html>
