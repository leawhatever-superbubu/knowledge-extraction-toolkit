<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小红书配图 - 核心心法</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #f5f5f5;
    font-family: "PingFang SC", -apple-system, sans-serif;
    padding: 20px;
  }
  .canvas {
    width: 1080px;
    height: 1080px;
    background: linear-gradient(135deg, #0A0E1A 0%, #1A2332 100%);
    position: relative;
    overflow: hidden;
    padding: 80px 60px;
  }
  /* 装饰几何 */
  .geo-1 {
    position: absolute;
    top: -100px;
    right: -100px;
    width: 400px;
    height: 400px;
    border: 1px solid rgba(129,199,212,0.15);
    border-radius: 50%;
  }
  .geo-2 {
    position: absolute;
    bottom: -150px;
    left: -150px;
    width: 500px;
    height: 500px;
    border: 1px solid rgba(129,199,212,0.1);
    border-radius: 50%;
  }
  /* 标题 */
  .title {
    font-size: 48px;
    font-weight: 900;
    color: #F2EDE3;
    margin-bottom: 20px;
    letter-spacing: 0.02em;
    position: relative;
    z-index: 1;
  }
  .title-highlight {
    color: #81C7D4;
  }
  .subtitle {
    font-size: 20px;
    color: rgba(255,255,255,0.6);
    margin-bottom: 60px;
    letter-spacing: 0.05em;
    position: relative;
    z-index: 1;
  }
  /* 心法卡片 */
  .tips {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 32px;
    position: relative;
    z-index: 1;
  }
  .tip-card {
    background: rgba(129,199,212,0.08);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(129,199,212,0.2);
    padding: 40px;
  }
  .tip-number {
    font-size: 56px;
    font-weight: 900;
    color: #81C7D4;
    margin-bottom: 16px;
    line-height: 1;
  }
  .tip-title {
    font-size: 28px;
    font-weight: 700;
    color: #F2EDE3;
    margin-bottom: 16px;
    letter-spacing: 0.02em;
  }
  .tip-desc {
    font-size: 18px;
    color: rgba(255,255,255,0.6);
    line-height: 1.6;
  }
  /* 底部 */
  .footer {
    position: absolute;
    bottom: 60px;
    left: 60px;
    right: 60px;
    padding-top: 32px;
    border-top: 1px solid rgba(129,199,212,0.25);
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 1;
  }
  .footer-brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .brand-logo {
    width: 32px;
    height: 32px;
    border: 1.5px solid #81C7D4;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    color: #81C7D4;
    font-weight: 600;
    line-height: 1.2;
    text-align: center;
  }
  .brand-text {
    font-size: 14px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.1em;
  }
  .footer-tag {
    font-size: 16px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.05em;
  }
  .download-btn {
    position: fixed;
    bottom: 40px;
    right: 40px;
    padding: 16px 32px;
    background: #81C7D4;
    color: #0A0E1A;
    border: none;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.05em;
    z-index: 1000;
  }
  .download-btn:hover {
    background: #9DD4DF;
  }
</style>
</head>
<body>
  <div class="canvas" id="canvas">
    <div class="geo-1"></div>
    <div class="geo-2"></div>
    
    <div class="title">
      核心心法：<span class="title-highlight">4 个关键</span>
    </div>
    <div class="subtitle">从 0 到能用的实战经验</div>
    
    <div class="tips">
      <div class="tip-card">
        <div class="tip-number">1</div>
        <div class="tip-title">框架先行</div>
        <div class="tip-desc">
          别让 AI 瞎拆<br>
          先定好模板和标签体系
        </div>
      </div>
      
      <div class="tip-card">
        <div class="tip-number">2</div>
        <div class="tip-title">人工兜底</div>
        <div class="tip-desc">
          AI 是助手，不是全自动<br>
          人工审核调优必不可少
        </div>
      </div>
      
      <div class="tip-card">
        <div class="tip-number">3</div>
        <div class="tip-title">小步快跑</div>
        <div class="tip-desc">
          别追求完美<br>
          先跑通 3-5 节课再全量
        </div>
      </div>
      
      <div class="tip-card">
        <div class="tip-number">4</div>
        <div class="tip-title">AI 开发工具</div>
        <div class="tip-desc">
          用 WorkBuddy 对话式开发<br>
          不会写代码也能做工具
        </div>
      </div>
    </div>
    
    <div class="footer">
      <div class="footer-brand">
        <div class="brand-logo">CT<br>RD</div>
        <span class="brand-text">草台研究部</span>
      </div>
      <span class="footer-tag">效率提升 5 倍的秘密</span>
    </div>
  </div>
  
  <button class="download-btn" onclick="downloadImage()">下载配图</button>
  
  <script>
    async function downloadImage() {
      const canvas = document.getElementById('canvas');
      const scale = 2;
      
      const script = document.createElement('script');
      script.src = 'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
      document.head.appendChild(script);
      
      script.onload = async () => {
        const renderedCanvas = await html2canvas(canvas, {
          scale: scale,
          backgroundColor: null,
          logging: false,
          width: 1080,
          height: 1080
        });
        
        const link = document.createElement('a');
        link.download = '小红书配图-核心心法.png';
        link.href = renderedCanvas.toDataURL('image/png');
        link.click();
      };
    }
  </script>
</body>
</html>
