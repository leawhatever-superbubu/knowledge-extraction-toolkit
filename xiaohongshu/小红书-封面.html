<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小红书封面 - 40节课变700知识点</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #f5f5f5;
    font-family: "PingFang SC", -apple-system, sans-serif;
    padding: 20px;
  }
  .canvas {
    width: 1080px;
    height: 1080px;
    background: linear-gradient(135deg, #0A0E1A 0%, #1A2332 100%);
    position: relative;
    overflow: hidden;
  }
  /* 装饰性几何图形 */
  .geo-1 {
    position: absolute;
    top: -100px;
    right: -100px;
    width: 400px;
    height: 400px;
    border: 1px solid rgba(129,199,212,0.15);
    border-radius: 50%;
  }
  .geo-2 {
    position: absolute;
    bottom: -150px;
    left: -150px;
    width: 500px;
    height: 500px;
    border: 1px solid rgba(129,199,212,0.1);
    border-radius: 50%;
  }
  .geo-3 {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(45deg);
    width: 800px;
    height: 800px;
    border: 1px solid rgba(129,199,212,0.08);
  }
  /* 内容容器 */
  .content {
    position: relative;
    z-index: 1;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 80px 60px;
  }
  /* 品牌标识 */
  .brand {
    position: absolute;
    top: 40px;
    left: 40px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .brand-logo {
    width: 40px;
    height: 40px;
    border: 1.5px solid #81C7D4;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: #81C7D4;
    font-weight: 600;
    letter-spacing: 0.5px;
    line-height: 1.2;
    text-align: center;
  }
  .brand-text {
    font-size: 14px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.1em;
  }
  /* 主标题 */
  .title-main {
    font-size: 64px;
    font-weight: 900;
    color: #F2EDE3;
    line-height: 1.3;
    text-align: center;
    margin-bottom: 40px;
    letter-spacing: 0.02em;
  }
  .title-highlight {
    color: #81C7D4;
    font-size: 72px;
  }
  .title-arrow {
    color: #81C7D4;
    font-weight: 400;
    margin: 0 16px;
  }
  /* 副标题 */
  .subtitle {
    font-size: 28px;
    color: rgba(255,255,255,0.7);
    line-height: 1.6;
    text-align: center;
    margin-bottom: 60px;
    font-weight: 400;
    letter-spacing: 0.05em;
  }
  /* 数据卡片 */
  .stats {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 24px;
    width: 100%;
    max-width: 800px;
    margin-top: 60px;
  }
  .stat-card {
    background: rgba(129,199,212,0.08);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(129,199,212,0.2);
    padding: 32px;
    text-align: center;
  }
  .stat-number {
    font-size: 48px;
    font-weight: 900;
    color: #81C7D4;
    margin-bottom: 8px;
  }
  .stat-label {
    font-size: 16px;
    color: rgba(255,255,255,0.6);
    letter-spacing: 0.1em;
  }
  /* 底部标签 */
  .footer {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .tag {
    font-size: 14px;
    color: rgba(255,255,255,0.5);
    padding: 8px 16px;
    border: 1px solid rgba(129,199,212,0.3);
    letter-spacing: 0.05em;
  }
  /* 下载按钮 */
  .download-btn {
    position: fixed;
    bottom: 40px;
    right: 40px;
    padding: 16px 32px;
    background: #81C7D4;
    color: #0A0E1A;
    border: none;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.05em;
    z-index: 1000;
  }
  .download-btn:hover {
    background: #9DD4DF;
  }
</style>
</head>
<body>
  <div class="canvas" id="canvas">
    <!-- 装饰几何 -->
    <div class="geo-1"></div>
    <div class="geo-2"></div>
    <div class="geo-3"></div>
    
    <!-- 品牌标识 -->
    <div class="brand">
      <div class="brand-logo">CT<br>RD</div>
      <span class="brand-text">草台研究部</span>
    </div>
    
    <!-- 主内容 -->
    <div class="content">
      <div class="title-main">
        <span class="title-highlight">40</span> 节课<br>
        <span class="title-arrow">→</span><br>
        <span class="title-highlight">700</span> 个知识点
      </div>
      
      <div class="subtitle">
        我用 AI 做知识库<br>
        省了 100 小时
      </div>
      
      <!-- 数据卡片 -->
      <div class="stats">
        <div class="stat-card">
          <div class="stat-number">5×</div>
          <div class="stat-label">效率提升</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">3s</div>
          <div class="stat-label">精准定位</div>
        </div>
      </div>
    </div>
    
    <!-- 底部标签 -->
    <div class="footer">
      <span class="tag">AI 工具</span>
      <span class="tag">知识库</span>
      <span class="tag">效率提升</span>
      <span class="tag">开源</span>
    </div>
  </div>
  
  <button class="download-btn" onclick="downloadImage()">下载封面图</button>
  
  <script>
    async function downloadImage() {
      const canvas = document.getElementById('canvas');
      const scale = 2; // 2x 高清
      
      // 使用 html2canvas
      const script = document.createElement('script');
      script.src = 'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
      document.head.appendChild(script);
      
      script.onload = async () => {
        const renderedCanvas = await html2canvas(canvas, {
          scale: scale,
          backgroundColor: null,
          logging: false,
          width: 1080,
          height: 1080
        });
        
        const link = document.createElement('a');
        link.download = '小红书封面-40节课变700知识点.png';
        link.href = renderedCanvas.toDataURL('image/png');
        link.click();
      };
    }
  </script>
</body>
</html>
